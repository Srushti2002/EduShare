version: '3'
services:
  
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: ./server
    ports:
      - "10000:10000"
    depends_on:
      - mongo
    env_file:
      - ./server/.env
  frontend:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - backend
