services:
  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./server
    restart: always
    ports:
      - "10000:10000"
    depends_on:
      - redis
    env_file:
      - ./server/.env
    environment:
      - REDIS_HOST=redis
  frontend:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - backend
